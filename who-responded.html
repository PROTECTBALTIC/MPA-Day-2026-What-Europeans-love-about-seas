<title>Who Responded - Exhibit V8</title>
<style>
body{margin:0;background:#071723;color:white;font-family:Arial,sans-serif;overflow:visible}
.header{text-align:center;padding:10px 0;background:linear-gradient(180deg,#0b3147,#071723)}.backBtn{
position:absolute;
left:20px;
top:20px;
padding:10px 18px;
border-radius:999px;
text-decoration:none;
color:white;
font-weight:700;
font-size:18px;
background:linear-gradient(180deg,#3c607a,#294b63);
border:1px solid rgba(255,255,255,.18);
box-shadow:
 inset 0 1px 0 rgba(255,255,255,.18),
 0 2px 8px rgba(0,0,0,.25);
cursor:pointer;
}
h1{margin:0;font-size:52px;font-family:'Early Man', serif;letter-spacing:1px}.sub{opacity:.9;font-size:22px}
.stage{height:calc(100vh - 90px);display:grid;grid-template-columns:1fr 340px;gap:20px;padding:12px 20px 20px 20px;box-sizing:border-box}
.mapPanel{position:relative;background:rgba(255,255,255,.04);border-radius:28px;overflow:visible}
#map{display:flex;align-items:center;justify-content:center;height:100%;} #map svg{width:95%;height:auto;max-height:92vh;}
.sidebar{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border-radius:28px;padding:24px;display:flex;flex-direction:column;min-height:0;height:100%;overflow:hidden}
.stat{font-size:48px;font-weight:bold;color:var(--basin-colour,#35c6ff)}
.filters{position:absolute;left:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:20}
.btn{border:none;border-radius:999px;padding:10px 16px;background:rgba(0,0,0,.45);color:white;cursor:pointer}

.btn.active{color:white;font-weight:bold}
.btn.all.active{background:#0b8cff;box-shadow:0 0 25px #0b8cff}
.btn.atlantic.active{background:#9fe1ff;box-shadow:0 0 25px #9fe1ff}
.btn.baltic.active{background:#1eb6ff;box-shadow:0 0 25px #1eb6ff}
.btn.black.active{background:#63e35f;box-shadow:0 0 25px #63e35f}
.btn.eastmed.active{background:#dbea45;color:#183040;box-shadow:0 0 25px #dbea45}
.btn.north.active{background:#18d7c5;box-shadow:0 0 25px #18d7c5}
.btn.westmed.active{background:#00b26b;box-shadow:0 0 25px #00ff99}

.legend{margin-top:auto;border-top:1px solid rgba(255,255,255,.15);padding-top:15px}
.scale{height:14px;border-radius:10px;background:linear-gradient(90deg,rgba(53,198,255,.2),rgba(53,198,255,1))}

.flag{
 width:20px;
 height:14px;
 margin-right:8px;
 vertical-align:middle;
 border-radius:2px;
 box-shadow:0 0 2px rgba(0,0,0,.3);
}

.logo{
position:absolute;
right:20px;
top:12px;
height:70px;
width:auto;
z-index:50;
}

</style>

function info(title,total,dataObj){
 const colour=window.currentMapColour||'#0b8cff';
 let rows='';
 if(dataObj){
   const entries=Object.entries(dataObj).sort((a,b)=>b[1]-a[1]);
   rows='<div style="margin-top:16px;font-size:14px;opacity:.9">COUNTRIES REPRESENTED</div>';
   rows+='<div style="margin-top:8px;line-height:1.8">';
   entries.forEach(([country,count])=>{
      rows += '<div style="display:flex;justify-content:space-between"><span>'+'<img class="flag" src="https://flagcdn.com/w20/'+(countryFlagCodes[country]||'xx')+'.png"> '+country+'</span><strong>'+count+'</strong></div>';

   '<h2>'+title+'</h2>'+
   '<div class="stat" style="color:'+colour+'">'+total+'</div>'+
   '<div>respondents</div>'+rows;
}





function buildAgeProfile(country){
 let raw={};
if(window.currentBasinName &&
 window.currentBasinName!=='Europe Overview' &&
 window.currentBasinName!=='All Responses' &&
 typeof basinAgeByCountry!=='undefined' &&
 basinAgeByCountry[window.currentBasinName] &&
 basinAgeByCountry[window.currentBasinName][country]){
 raw=basinAgeByCountry[window.currentBasinName][country];
}else{
 raw=ageByCountry[country]||{};
}
 const ages={"Under 18":0,"18-24":0,"25-34":0,"35-44":0,"45-54":0,"55-64":0,"65+":0};

 Object.entries(raw).forEach(([k,v])=>{
   const a=k.toLowerCase();
   if(a.includes('under')) ages["Under 18"]+=v;
   else if(a.includes('18-24')) ages["18-24"]+=v;
   else if(a.includes('25-34')) ages["25-34"]+=v;
   else if(a.includes('35-44')) ages["35-44"]+=v;
   else if(a.includes('45-54')) ages["45-54"]+=v;
   else if(a.includes('55-64')) ages["55-64"]+=v;
   else if(a.includes('65')) ages["65+"]+=v;
 });

 const order=["Under 18","18-24","25-34","35-44","45-54","55-64","65+"];
 const max=Math.max(1,...Object.values(ages));

 let out='<div style="margin-top:12px;font-size:13px;opacity:.9">AGE PROFILE</div>';
 order.forEach(age=>{
   const v=ages[age];
   out+='<div style="display:flex;align-items:center;gap:6px;margin:4px 0"><div style="width:60px;font-size:11px">'+age+'</div><div style="flex:1;height:8px;background:rgba(255,255,255,.12);border-radius:99px"><div style="height:8px;width:'+(v/max*100)+'%;background:'+(window.currentMapColour||"#0b8cff")+';border-radius:99px"></div></div><div style="width:18px;text-align:right">'+v+'</div></div>';
 });
 return out;
}



function paint(data,title){ window.currentBasinName=title; window.currentBasinData=data;
 document.querySelectorAll('svg [id]').forEach(el=>el.style.fill='rgba(255,255,255,.08)');
 const max=Math.max(...Object.values(data));
 Object.entries(data).forEach(([country,count])=>{
   const el=document.getElementById(mapping[country]);
   if(!el) return;
   
const base=window.currentMapColour||'#35c6ff';
const rgb=base.match(/[A-Fa-f0-9]{2}/g).map(x=>parseInt(x,16));
el.style.fill='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(0.15+(count/max)*0.85)+')';

   
el.onmouseenter=()=>{
 const code=(countryFlagCodes[country]||'xx');
 document.getElementById('info').innerHTML=
 '<h2><img class="flag" src="https://flagcdn.com/w20/'+code+'.png"> '+country+'</h2>'+
 '<div class="stat" style="color:'+(window.currentMapColour||'#0b8cff')+'">'+count+'</div>'+
 '<div>responses</div>'+buildAgeProfile(country);
};

   el.onmouseleave=()=>{
      if(window.currentBasinData){
         info(window.currentBasinName,
              Object.values(window.currentBasinData).reduce((a,b)=>a+b,0),
              window.currentBasinData);
      }
   };
 });
 info(title,Object.values(data).reduce((a,b)=>a+b,0),data);
}
