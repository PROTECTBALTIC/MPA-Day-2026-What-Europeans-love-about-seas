
<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What should MPAs do?</title>
<style>
html,body{
margin:0;
overflow:hidden;
background:radial-gradient(circle at top,#35c6ff 0%,#083b5c 45%,#02131f 100%);
font-family:"Berlin Sans FB","Berlin Sans","Trebuchet MS",sans-serif;
}

canvas{display:block;}

#panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:620px;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
color:white;
z-index:10;
max-height:85vh;
overflow:auto;
}



#mpaLogo{
position:absolute;
top:24px;
right:28px;
width:90px;
opacity:.92;
pointer-events:none;
z-index:20;
}


#title{
font-size:42px;
text-align:center;
font-family:"Early Man","Impact","Arial Black",sans-serif;
letter-spacing:1px;
font-weight:900;
margin-bottom:18px;
}

#selected{
font-size:34px;
text-align:center;
color:#ffe082;
}



.animatedQuote{
opacity:0;
animation:quoteFade 4.8s ease forwards;
min-height:72px;
}

@keyframes quoteFade{
0%{
opacity:0;
transform:translateY(8px);
}
12%{
opacity:1;
transform:translateY(0);
}
78%{
opacity:1;
}
100%{
opacity:1;
transform:translateY(0);
}
}


.quote{
margin-top:10px;
padding-left:10px;
border-left:2px solid rgba(255,255,255,.22);
font-size:18px;
line-height:1.7;
font-style:italic;
font-weight:500;
}

#basinSelector{
position:absolute;
right:20px;
bottom:20px;
z-index:50;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:12px;
border-radius:18px;
}

#basinSelector button{
background:rgba(255,255,255,.12);
color:white;
border:1px solid rgba(255,255,255,.15);
border-radius:999px;
padding:8px 14px;
margin:4px;
cursor:pointer;
transition:all .25s ease;
}

#basinSelector button:hover{
background:rgba(255,255,255,.22);
transform:translateY(-2px);
}

#basinSelector button.active{
transform:translateY(-2px) scale(1.08);

background:rgba(255,224,130,.95);
color:#00334d;
font-weight:bold;
box-shadow:0 0 18px rgba(255,224,130,.6);
}

#basinName{
color:#ffe082;
font-size:20px;
text-align:center;
margin-top:8px;
}


#seaBasinTitle{
position:absolute;top:18px;left:50%;transform:translateX(-50%);
z-index:45;font-family:"Early Man","Impact","Arial Black",sans-serif;
font-size:56px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
pointer-events:none;transition:all .45s ease;color:#ffffff;text-align:center;
text-shadow:0 0 15px rgba(255,255,255,.25);
}

.backBtn{
  position:absolute;
  left:20px;
  top:20px;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  color:white;
  font-weight:700;
  font-size:18px;
  background:linear-gradient(180deg,#3c607a,#294b63);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 2px 8px rgba(0,0,0,.25);
  cursor:pointer;
  z-index:100;
}


@media (max-width:768px){
html,body{
  overflow:auto;
}

#seaBasinTitle{
  font-size:32px;
  top:12px;
}

#panel{
  width:min(92vw,620px);
  top:52%;
  left:50%;
  transform:translate(-50%,-50%);
}

#title{font-size:30px;}
#selected{font-size:24px;}

#basinSelector{
  position:static;
  width:100%;
  max-width:none;
  margin:30px auto 20px auto;
  text-align:center;
  background:transparent;
  white-space:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
}

#basinSelector button{
  display:inline-flex;
  font-size:12px;
  padding:6px 10px;
  margin:2px;
}

canvas{
  margin-top:0;
  display:block;
}
body{padding-bottom:420px;}
}


@media (max-width:768px){
  #basinSelector{
    position:fixed !important;
    left:0 !important;
    right:0 !important;
    bottom:0 !important;
    width:100% !important;
    margin:0 !important;
    z-index:9999 !important;
    background:rgba(8,59,92,.95) !important;
    border-radius:0 !important;
  }

  #mobileBasinSelector{
    display:flex !important;
    justify-content:center;
    gap:6px;
    flex-wrap:nowrap;
    overflow-x:auto;
    padding:12px;
    margin:30px auto 20px auto;
    width:95vw;
    box-sizing:border-box;
  }

  #mobileBasinSelector button{
    white-space:nowrap;
  }
}

</style>
</head>

,

function drawTurtle(tu,t){

ctx.save();

ctx.translate(tu.x,tu.y);

ctx.rotate(Math.sin(t*0.0006+tu.phase)*0.05);

ctx.fillStyle="rgba(120,220,180,.16)";

// shell
ctx.beginPath();
ctx.ellipse(0,0,tu.size,tu.size*0.72,0,0,Math.PI*2);
ctx.fill();

// head
ctx.beginPath();
ctx.arc(tu.size*1.0,0,tu.size*0.18,0,Math.PI*2);
ctx.fill();

// front flippers
const flap = Math.sin(t*0.004+tu.phase)*0.35;

ctx.beginPath();
ctx.ellipse(
tu.size*0.32,
-tu.size*0.52,
tu.size*0.18,
tu.size*0.45,
-flap,
0,
Math.PI*2
);
ctx.fill();

ctx.beginPath();
ctx.ellipse(
tu.size*0.32,
tu.size*0.52,
tu.size*0.18,
tu.size*0.45,
flap,
0,
Math.PI*2
);
ctx.fill();

// rear flippers
ctx.beginPath();
ctx.ellipse(
-tu.size*0.85,
-tu.size*0.35,
tu.size*0.12,
tu.size*0.25,
-0.5,
0,
Math.PI*2
);
ctx.fill();

ctx.beginPath();
ctx.ellipse(
-tu.size*0.85,
tu.size*0.35,
tu.size*0.12,
tu.size*0.25,
0.5,
0,
Math.PI*2
);
ctx.fill();

ctx.restore();
}



let quoteInterval = null;

function renderQuotes(word){

const q=document.getElementById("quotes");

const quotes = currentQuoteMap[word] || [];

q.innerHTML="";

if(quoteInterval){
clearInterval(quoteInterval);
}

if(!quotes.length){
return;
}

let current = 0;

function showQuote(){

q.innerHTML = "";

const d=document.createElement("div");
d.className="quote animatedQuote";

const highlighted = quotes[current].replace(
new RegExp(word,"gi"),
match=>`<span style="color:#ffd54f;font-weight:900;text-shadow:0 0 8px rgba(255,213,79,0.65);">${match}</span>`
);

d.innerHTML="“"+highlighted+"”";


q.appendChild(d);

current = (current + 1) % quotes.length;

}

showQuote();

if(quotes.length > 1){
quoteInterval = setInterval(showQuote, 4800);
}

}




function redistributeWords(){

if(window.innerWidth < 768){

canvas.height = window.innerHeight;
const panelTop = canvas.height * 0.12;
const panelBottom = canvas.height * 0.55;

const topWords = 0;
const bottomWords = words.length - topWords;

words.forEach((w,i)=>{

if(i < topWords){

const x = ((i+1)/(topWords+1))*canvas.width;

w.x = x;
w.y = 95;

}else{

const j = i - topWords;
const rows = Math.ceil(bottomWords/2);
const col = j % 2;
const row = Math.floor(j/2);

w.x = col===0 ? canvas.width*0.30 : canvas.width*0.70;
w.y = panelBottom + 140 + row*60;
}

w.homeX = w.x;
w.homeY = w.y;

});

canvas.height = Math.max(window.innerHeight,
panelBottom + 520 + Math.ceil(bottomWords/2)*60);

return;
}

words.forEach((w,i)=>{

const angle = (i / words.length) * Math.PI * 2;

const radiusX = canvas.width * 0.32;
const radiusY = canvas.height * 0.30;

w.x = canvas.width/2 + Math.cos(angle) * radiusX;
w.y = canvas.height/2 + Math.sin(angle) * radiusY;
w.homeX = w.x;
w.homeY = w.y;

});

}

setTimeout(redistributeWords, 50);

window.addEventListener("resize", redistributeWords);

function drawFish(f,t){
ctx.save();

ctx.translate(f.x,f.y);

const swim=Math.sin(t*0.003+f.phase);
ctx.rotate(swim*0.12);

const g=ctx.createLinearGradient(-f.size,0,f.size,0);
g.addColorStop(0,"rgba(120,220,255,0.04)");
g.addColorStop(.5,"rgba(160,240,255,0.18)");
g.addColorStop(1,"rgba(120,220,255,0.04)");

ctx.fillStyle=g;

ctx.beginPath();
ctx.moveTo(f.size,0);

ctx.bezierCurveTo(
f.size*.2,-f.size*.35,
-f.size*.7,-f.size*.28,
-f.size,0
);

ctx.bezierCurveTo(
-f.size*.7,f.size*.28,
f.size*.2,f.size*.35,
f.size,0
);

ctx.fill();

ctx.save();
ctx.translate(-f.size,0);
ctx.rotate(Math.sin(t*.006+f.phase)*.4);

ctx.beginPath();
ctx.moveTo(0,0);
ctx.lineTo(-f.size*.7,-f.size*.4);
ctx.lineTo(-f.size*.45,0);
ctx.lineTo(-f.size*.7,f.size*.4);
ctx.closePath();
ctx.fill();

ctx.restore();
ctx.restore();
}



// seagrass background
function drawSeagrassField(t){

ctx.save();

for(let i=0;i<34;i++){

const baseX = (i/33) * canvas.width;
const height = 50 + ((i * 17) % 70);

ctx.strokeStyle = "rgba(80,180,120,0.14)";


ctx.lineWidth =
(i % 7 === 0) ? 7 :
(i % 5 === 0) ? 5 :
(i % 3 === 0) ? 3.5 :
2;



ctx.beginPath();
ctx.moveTo(baseX, canvas.height + 10);

for(let y=0;y>-height;y-=10){

const sway =
Math.sin((t*0.0015)+(i*0.7)+(y*0.03)) * 6;

ctx.lineTo(baseX + sway, canvas.height + y);

}


ctx.stroke();

// extra dense patches
if(i % 6 === 0){

ctx.beginPath();
ctx.moveTo(baseX + 6, canvas.height + 10);

for(let y=0;y>-height*0.9;y-=10){

const sway =
Math.sin((t*0.0018)+(i*0.9)+(y*0.03)) * 8;

ctx.lineTo(baseX + 6 + sway, canvas.height + y);

}

ctx.stroke();

}


}

ctx.restore();

}

function drawJellyfish(j,t){

ctx.save();

ctx.translate(j.x,j.y);

const pulse = Math.sin(t*0.003 + j.phase);

ctx.fillStyle = "rgba(220,180,255,0.16)";

// bell
ctx.beginPath();
ctx.arc(0,0,j.size,Math.PI,0);
ctx.quadraticCurveTo(j.size*0.8,j.size*0.3,0,j.size*0.45);
ctx.quadraticCurveTo(-j.size*0.8,j.size*0.3,-j.size,0);
ctx.fill();

// tentacles
ctx.strokeStyle="rgba(220,180,255,0.12)";
ctx.lineWidth=2;

for(let i=-3;i<=3;i++){

ctx.beginPath();

ctx.moveTo(i*6,j.size*0.2);

for(let y=0;y<70;y+=8){

const sway = Math.sin((t*0.002)+(y*0.08)+i) * 6;

ctx.lineTo(i*6 + sway,j.size*0.2 + y);

}

ctx.stroke();

}

ctx.restore();

}


function animate(t){

j.y = canvas.height + 140;

drawJellyfish(j,t);

function buildWordCloud(ds){
    words.length = 0;

    ds.wordsData.forEach((w,i)=>{
        words.push({
            text:w[0],
            count:w[1],
            x:canvas.width/2 + Math.cos(i*0.55)*460,
            y:canvas.height/2 + Math.sin(i*0.55)*340,
            homeX:canvas.width/2 + Math.cos(i*0.55)*460,
            homeY:canvas.height/2 + Math.sin(i*0.55)*340,
            size:(()=>{
                const counts=ds.wordsData.map(x=>x[1]);
                const min=Math.min(...counts);
                const max=Math.max(...counts);
                const scale=(w[1]-min)/Math.max(1,max-min);
                return 22 + scale*(56-22);
            })(),
            selected:false,
            phase:Math.random()*1000
        });
    });

    window.quoteMap = ds.quoteMap;
    if(window.innerWidth < 768){ setTimeout(()=>{ if(typeof redistributeWords==='function') redistributeWords(); },0); }

    const selected = document.getElementById('selected');
    const count = document.getElementById('count');
    if(selected) selected.innerText = "Click a word";
    if(count) count.innerText = "";
    const quotes = document.getElementById('quotes');
    if(quotes) quotes.innerHTML = "";
}

function switchDataset(name){
    const ds = basinDatasets[name];
    if(!ds) return;
    currentQuoteMap = ds.quoteMap || {};
    buildWordCloud(ds);
    if(window.innerWidth < 768 && typeof redistributeWords === 'function'){ words.forEach(w=>{if(w.baseX!==undefined){w.x=w.baseX; w.y=w.baseY;}});
        setTimeout(redistributeWords,50);
    }
    const q=document.getElementById('quotes'); if(q) q.innerHTML='';
}


const originalSwitchDataset = switchDataset;

switchDataset = function(name){
    originalSwitchDataset(name);

    // Clear selected words
    if(typeof words !== 'undefined'){
        words.forEach(w => w.selected = false);
    }

    // Clear quotes panel
    const q = document.getElementById('quotes');
    if(q) q.innerHTML = '';

    // Stop any running quote rotation
    if(typeof quoteInterval !== 'undefined' && quoteInterval){
        clearInterval(quoteInterval);
        quoteInterval = null;
    }

    const basinName=document.getElementById('basinName');
    if(basinName) basinName.innerText=name;

    document.querySelectorAll('#basinSelector button').forEach(b=>{
        b.classList.remove('active');
        if(b.textContent.trim()===name ||
           (name==='All Responses' && b.textContent.trim()==='All')){
            b.classList.add('active');
        }
    });
};
