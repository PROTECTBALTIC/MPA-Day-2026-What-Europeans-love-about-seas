

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What People Love About European Seas</title>
<style>
html,body{
margin:0;height:100%;overflow:hidden;
font-family:Segoe UI,sans-serif;background:#02131f;
}
.hero{position:relative;height:100vh;overflow:hidden;}
.slide{
position:absolute;inset:0;
background-size:cover;
background-position:center;
opacity:0;
animation:crossfade 72s infinite;
}
.slide:nth-child(1){animation-delay:0s;background-image:url('MPA Day 2026-14.png');}
.slide:nth-child(2){animation-delay:8s;background-image:url('MPA Day 2026-15.png');}
.slide:nth-child(3){animation-delay:16s;background-image:url('MPA Day 2026-16.png');}
.slide:nth-child(4){animation-delay:24s;background-image:url('MPA Day 2026-17.png');}
.slide:nth-child(5){animation-delay:32s;background-image:url('MPA Day 2026-18.png');}
.slide:nth-child(6){animation-delay:40s;background-image:url('MPA Day 2026-19.png');}
.slide:nth-child(7){animation-delay:48s;background-image:url('MPA Day 2026-20.png');}
.slide:nth-child(8){animation-delay:56s;background-image:url('MPA Day 2026-21.png');}
.slide:nth-child(9){animation-delay:64s;background-image:url('MPA Day 2026-22.png');}
  
@keyframes crossfade{
0%,28%{opacity:1;transform:scale(1);}
33%,100%{opacity:0;transform:scale(1.08);}
}

.overlay{
position:absolute;inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(2,19,31,.7));
}


.logoContainer{
position:absolute;
top:calc(4% + 0px);
left:50%;
transform:translateX(-50%);
width:min(1200px,85vw);
height:900px;
overflow:hidden;
z-index:5;
}

.logo{

position:absolute;
top:calc(4% - 100px);
left:50%;
transform:translateX(-50%);
width:min(1200px,85vw);
top:0px;
width:100%;
filter:drop-shadow(0 10px 30px rgba(0,0,0,.35));
}

.cards{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
width:min(1200px,90vw);
justify-content:center;
flex-wrap:wrap;
z-index:5;
}

.card{
width:320px;
padding:24px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(14px);
border-radius:24px;
color:white;
border:1px solid rgba(255,255,255,.2);
}

.stat{
position:absolute;
top:70%;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
font-weight:600;
z-index:5;
}

</style>
</head>
<body>

<div class="hero">
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
  
<div class="overlay"></div>

<div class="logoContainer"><img class="logo" src="logo_survey.png"></div>

<div class="stat" id="stat">357 people shared their views</div>

<div class="cards">
<div class="card">
<h3>Who Responded?</h3>
<p>Explore responses across Europe, demographics and sea-basin participation.</p>
</div>

<div class="card">
<h3>What Do People Value?</h3>
<p>Discover what people value most about Europe's seas.</p>
</div>

<div class="card">
<h3>What Should MPAs Do?</h3>
<p>Explore the interactive word cloud and sea-basin insights.</p>
</div>
</div>
</div>

<script>
const msgs=[
"Ocean protection needs human connection",
"XXX people shared their views",
"6 European sea basins represented",
"XXXX words analysed",
"XX % of Europeans know what an MPA is"
];

let i=0;
setInterval(()=>{
i=(i+1)%msgs.length;
document.getElementById('stat').textContent=msgs[i];
},4000);
</script>

</body>
</html>
